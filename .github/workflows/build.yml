name: Build 3DS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup devkitPro
      uses: devkitPro/devkitpro-actions@v1
      with:
        packages: "devkitARM libctru"

    - name: Build 3DS project
      run: make

    - name: Upload 3DSX
      uses: actions/upload-artifact@v3
      with:
        name: 3ds-build
        path: build/launcher.3dsx
