name: Build 3DS .firm

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Upload prebuilt devkitARM + libctru
      uses: actions/download-artifact@v4
      with:
        name: devkitARM-archive
        path: /tmp/devkitpro

    - name: Extract toolchain
      run: |
        mkdir -p $HOME/devkitPro
        tar -xf /tmp/devkitpro/devkitpro.tar.xz -C $HOME/devkitPro

    - name: Add devkitPro to PATH
      run: |
        echo "$HOME/devkitPro/devkitARM/bin:$HOME/devkitPro/tools/bin:$PATH" >> $GITHUB_PATH

    - name: Compile main.c
      run: |
        mkdir -p build
        cd build
        $HOME/devkitPro/devkitARM/bin/arm-none-eabi-gcc -o launcher.elf ../main.c -lc -lctru -mfloat-abi=hard -march=armv6k
        $HOME/devkitPro/devkitARM/bin/3dsxtool launcher.elf boot.firm

    - name: Upload boot.firm artifact
      uses: actions/upload-artifact@v4
      with:
        name: boot-firm
        path: build/boot.firm
