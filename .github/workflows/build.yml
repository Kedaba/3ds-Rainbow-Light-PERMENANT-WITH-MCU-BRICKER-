name: Build 3DS Project

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitpro:latest

    steps:
    - uses: actions/checkout@v3

    - name: Install additional packages
      run: |
        apt-get update
        apt-get install -y make gcc git

    - name: Build project
      run: make

    - name: Upload 3DSX artifact
      uses: actions/upload-artifact@v4
      with:
        name: 3ds-build
        path: build/launcher.3dsx
