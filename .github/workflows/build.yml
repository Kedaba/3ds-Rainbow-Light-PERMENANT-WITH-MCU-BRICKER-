name: Build 3DS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install devkitPro
      run: |
        sudo mkdir -p /opt/devkitpro
        wget -qO- https://downloads.devkitpro.org/devkitpro-pacman.tar.xz | sudo tar -xJ -C /opt/devkitpro
        echo 'export DEVKITPRO=/opt/devkitpro' >> $GITHUB_ENV
        echo 'export DEVKITARM=$DEVKITPRO/devkitARM' >> $GITHUB_ENV
        echo 'export PATH=$DEVKITPRO/tools/bin:$PATH' >> $GITHUB_ENV

    - name: Install devkitARM & libctru
      run: |
        /opt/devkitpro/tools/bin/dkp-pacman -Syu --noconfirm devkitARM libctru

    - name: Build 3DS project
      run: |
        make
